name: CI and Deploy admins-nerior

on:
  push:
    branches: [main]

concurrency:
  group: admins-nerior-deploy
  cancel-in-progress: false

jobs:
  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install dependencies
        run: npm ci
      - name: Typecheck
        run: npm run typecheck
      - name: Build frontend
        run: npm run build

  deploy:
    needs: frontend
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        env:
          SERVER_HOST: ${{ secrets.SERVER_HOST }}
          SERVER_USER: ${{ secrets.SERVER_USER }}
          SSH_PRIVATE_KEY_B64: ${{ secrets.SSH_PRIVATE_KEY_B64 }}
        run: |
          set -e
          mkdir -p ~/.ssh
          echo "$SSH_PRIVATE_KEY_B64" | base64 -d > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H "$SERVER_HOST" >> ~/.ssh/known_hosts
          ssh -i ~/.ssh/deploy_key "$SERVER_USER@$SERVER_HOST" "
            set -e
            if [ ! -d /opt/admins-nerior/.git ]; then
              rm -rf /opt/admins-nerior
              git clone https://github.com/Stepa-Karpik/admins-nerior.git /opt/admins-nerior
            fi
            cd /opt/admins-nerior
            git fetch origin main
            git reset --hard origin/main
            docker compose up -d --build --remove-orphans
            docker image prune -f
          "
